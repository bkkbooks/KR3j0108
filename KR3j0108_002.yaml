body:
  text: 却掃編卷中宋徐度撰國朝以來凡政事有大更革必集百官議之不然猶使各條具利害所以盡人謀而通下情也熙寧初議貢舉北郊猶如此後厭其多異同不復講及司馬溫公為相欲增損貢舉之法復將使百官議因自建經明行修使朝官保任之法欲并議之草具將上先與范丞相謀范公曰朝廷欲求衆人之長而元宰先之似非明夷涖衆之義若已陳此書而衆人不隨則虛勞思慮而失宰相體若衆人皆隨則相君自謂莫已若矣然後諂者得志于其間而衆人默而退媚者既多使人或自信如莫已若矣前車可鑒也不若清心以俟衆論可者從不可者更俟衆賢議之如此則逸而易成有害亦可改而責議者矣若先漏此書之意則諂者更能增飾利害迎于公之前矣溫公不聽卒白而行之范氏家集載此書甚詳故事宰輔領州而中使以事經繇必傳宣撫問宣和間先公守南都地當東南水陸之衝使傳絡繹不絶一嵗中撫問者至十數故嘗有謝表曰天闕夢回必有感恩之淚日邊人至常聞念舊之言後因生日府掾張矩臣獻詩曰幾回天闕夢十走日邊人蓋用表語也矩臣退傅家好學喜為詩先公為相時欲稍薦用之已卒矣舊制凡掌外制必試而後命非有盛名如楊文公歐陽文忠蘇端明未嘗輒免故世尤以不試為重然故事茍嘗兼攝雖僅草一制亦復免試渡江後從班多不備官故外制多兼攝者及後為真皆循例得免近嵗有偶未兼攝而徑除者又特降旨免試焉國朝宰相執政既罷政事雖居藩府恩典皆殺政和中始置宣和殿大學士以蔡攸為之俸賜禮秩悉視見任二府其後踵之者其弟修其子行而孟昌齡王革髙伸亦繼為之然皆領宫觀使或開封府殿中省職事未嘗居外及革出鎮大名仍舊職以行而恩典悉如在京師其後蔡靖以資政殿學士知燕山府久之亦進是職再任恩數加之雖前宰相亦莫及矣先友崔陟字浚明年未二十舉進士待試京師一夕夢人告曰汝父攘羊恐不復見汝登科矣及寤意大惡之既果被黜還家見有羊毛積後垣下問何自得之其父曰昨有羊突入吾舍者吾既烹而食之矣陟因大驚而不敢言所夢未幾其父卒後數年乃登第後坐元符末上書論時事編入黨籍仕宦連蹇不進先公領裕民局辟為檢討官未幾局罷後以宿州通判終宗室士􅀈字明發少好學喜為文多技藝嘗畫韓退之皇甫持正訪李長吉事為髙軒過圗極蕭灑一時名士皆為賦之又嘗學書於米元章豫嘗見所藏元章一帖曰草不可妄學黃庭堅鍾離景伯可以為戒而魯直集中有答僧書云米元章書公自鑒其如何不同蘇翰林玄論也乃知二公論書素不相可如此程嗣真字儒臣文簡公之子也少喜學書自謂獨得古人用筆之妙嘗評近代能書者曰蘇才翁書筆勢遲怯吳越人無識頗學之自余為辨之後此間人亦知非也蔡君謨但能模學前人點畫及能草字而已周子發書妙出前輩至於草書殊未得自悟之意古人自悟者惟張旭與余而已錢塘關氏蓄其書數卷信為髙古今世不復見矣張友正字義祖退傅鄧公之子自少學書常居一小閣上杜門不治他事積三十年不輟遂以書自名神宗常評其草書為本朝第一豫頃在館中與其族孫巨山同舍嘗出所藏義祖家書數卷每幅不過數十字便了詞語皆如晉宋間人蓋閲古書之久不自知其然也杜岐公既致仕還家年已七十始學草書即工余嘗於其孫鼎家見一帖論草書曰草書之法當使意在筆先筆絶意在為佳耳筆勢縱逸有如飛動紙尾書時年七十八字又見有少時所節史記一編字如蠅頭字字端楷首尾如一又極詳備如禹本紀九州所貢名品略具蘇子瞻作李氏山房記言余猶及見老儒先生自言其少時欲求史記漢書而不可得幸而得之皆手自書日夜讀誦惟恐不及正此類邪蘇丞相子容留守南都劉丞相莘老簽書判官事時年尚少蘇公大器愛之元祐中劉公為右僕射兼中書侍郎蘇公為尚書左丞同秉政嘗因祠事各居本省致齋劉公有夜直中書省寄左丞子容公詩曰膺門蚤嵗預登龍儉幕中間託下風敢謂彈冠煩貢禹每思移疾避胡公論文青眼今猶在報國丹心老更同夜直沉迷坐東省齋居清絶望南宫蘇公和曰五年班綴望夔龍曽託帡幪庇雨風末路自憐黃髮老蚤時曽識黑頭公升沉不改交情見出處雖殊趣舍同謾扣蕪音答髙唱終慚下管應清宫蘇門下子由時為右丞亦和曰雷雨年年起卧龍穆然臺閣有清風一時畫諾雖云舊晚嵗吁俞本自公松竹經寒俱不改鹽梅共鼎固非同新詩和遍東西府律吕更成十二宫時朝廷和此詩者甚衆往往見於名士文集中神宗患本朝國史之繁嘗欲重修五朝正史通為一書命曽子固專領其事且詔自擇屬官曾以彭城陳師道應詔朝廷以布衣難之未幾撰太祖皇帝總敘一篇以進請繫之太祖本紀篇末以為國史書首其説以為太祖大度豁如知人善任使與漢髙祖同而漢祖所不及者其事有十因具論之纍二千餘言神宗覽之不悅曰為史但當實録以示後世亦何必區區與先代帝王較優劣乎且一篇之贊已如許之多成書將復幾何於是書竟不果成祖宗時諸路帥司皆有走馬承受公事二員一使臣一宦者屬官也每季得奏事京師軍旅之外他無所預徽宗朝易名亷訪使者仍俾與監司序官凡耳目所及皆以聞於是與帥臣抗禮而脅制州縣無所不至于時頗患苦之宣和中先公守北門有王褒者宦官也來為亷訪使者在輩流中每以公亷自喜且言素仰先公之名德極相親事會入奏回傳宣撫問畢因言比具以公治行奏聞上意甚悅行召還矣先公退語諸子意甚耻之故謝表有曰老若李鄘久自安於外鎮才非蕭傅敢雅意於本朝長兄惇義之文蓋具著先公之意也唐書李鄘傳為淮南節度使先是吐突承璀為監軍貴竉甚鄘以剛嚴治相禮憚稍厚善承璀歸數稱薦之召拜門下侍郎同平章事鄘不喜由宦幸進及出祖樂作泣下謂諸將曰吾老安外鎮宰相豈吾任乎至京師不肯視事引疾固辭改户部尚書方王氏之學盛時士大夫讀書求義理率務新竒然用意太過往往反失於鑿有稱老杜禹廟詩最工者或問之對曰空庭垂橘柚謂厥包橘柚錫貢也古屋畫龍蛇謂驅龍蛇而放之菹也此皆著禹之功也得不謂之工乎崇寧初蔡太師持紹述之説為相既悉取元祐廷臣及元符末上書論新法之人指為謗訕而投竄之又籍其名氏刻之於石謂之黨籍碑且將世世錮其子孫其後再相也亦自知其太甚而未有以為説葉左丞為祠部郎從容謂之曰夢得聞天下有道則庶人不議今舉籍上書之人名氏刻之于石以昭示來世恐非所以彰先帝之盛德也蔡大感寤其後黨禁稍弛而碑竟仆焉胡尚書直孺聞之歎曰此人宜在君側祖宗時有官人在官應進士舉謂之鎖廳者謂鎖其廳事而出而後世因以有官人登第謂之鎖中甚無義理漢書食貨志鹽鐵丞孔僅咸陽言山海天地之藏宜屬少府陛下弗私以屬大農佐賦願募民日給費因官器作鬻鹽官與牢盆注蘇林曰牢價直也今世言顧手牢如淳曰盆鬻鹽盆也鬻古煮字今煎鹽之器謂之盤以鐵為之廣袤數丈意盆之遺制也今鹽場所用皆元豐間所為製作甚精非官不能辦然亦有編竹為之而泥其中者烈火然其下而不焚物理有不可解至如此韓忠獻公罷相初授守司徒兼侍中鎮安武勝軍節度使公引故事以為祖宗舊制惟宗室近屬方授兩鎮臣若踰越常制是開邇臣希望僣忒之源神宗不從固辭至于再三乃改授淮南節度使元豐間文潞公加兩鎮亦不敢拜陳正字無已世家彭城後生從其逰者常十數人所居近城有隙地林木間則與諸生徜徉林下或愀然而歸竟登榻引被自覆呻吟久之矍然而興取筆疾書則一詩成矣因揭之壁間坐卧哦詠有竄易至月十日乃定有終不如意者則棄去之故平生所為至多而見於集中者才數百篇今世所傳率多雜偽唯魏衍所編二十卷者最善魏衍者字昌世亦彭城人從無已逰最久蓋髙弟也以學行見重于鄉里自以不能為王氏學因不事舉業家貧甚未嘗以為戚唯以經籍自娛為文章操筆立成名所居之居曰曲肱軒自號曲肱居士政和間先公守徐招置書館俾余兄弟從其學時年五十餘矣見異書猶手自抄寫故其家雖貧而藏書亦數千卷建炎初死於亂平生所為文今世無復存者良可嘆也魏昌世言無已平生惡人節書以為茍能盡記不忘固善不然徒廢日力而已夜與諸生會宿忽思一事必明燭翻閲得之乃已或以為可待旦者無已曰不然人情樂因循一放過則不復省矣故其學甚博而精尤好經術非如唐之諸子作詩之外他無所知也劉待制安世晚居南京客或問曰待制間居何以遣日正色對曰君子進德修業唯日不足而可遣乎曽尚書楙喜理性之學中年提舉淮西學事逰五祖山憑欄恍若有所得者因為偈曰四大本空五蔭皆藴靈臺一點常現圓明舊制輔臣典藩監司客位下馬就廳上馬先公頃在北都時諸使者守此制甚謹每相訪將起必牽馬就廳索轎冉三乃敢登轎韓獻肅公再相其弟黃門公在翰苑當制其後曽丞相子宣拜相時其弟子開為翰林學士當制初子開除吏部郎中子固掌外制告詞子固為之近嵗中書舍人當制而兄弟有除授多引嫌俾以次官行新唐書初成時韓忠獻公當國以其出于兩人文體不一恐惑後世遂建請詔歐陽文忠公别加刪潤以一之公固辭獨請各出名從之王銍云劉羲仲字壯輿道原之子也道原以史學自名羲仲世其家學嘗摘歐陽公五代史之訛誤為糾繆以示東坡東坡曰往嵗歐陽公著此書初成王荆公謂余曰歐陽公修五代史而不修三國志非也子盍為之乎余固辭不敢當夫為史者網羅數十百年之事以成一書其間豈能無小得失邪余所以不敢當荆公之託者正畏如公之徒掇拾其後耳乾德二年以兵部侍郎吕餘慶薛居正並本官參知政事先是已命趙普為相欲命居正等為之副而難其名稱詔問翰林承旨陶榖下丞相一等者有何官對曰唐有參知政事參知機務故以命之仍令不宣制不押班不知印不升政事堂止令就宣徽使廳上事殿庭别設磚位於宰相後勑尾署銜降宰相數字月俸雜給半之蓋帝意未欲居正等名位與普齊也史臣錢若水等曰按唐故事裴寂為右僕射參知政事杜淹為御史大夫參議朝政魏徴為祕書監參議朝政蕭瑀為特進參議政事劉洎為門下侍郎參知政事劉幽求為中書舍人參知機務然並宰相之任也又髙宗嘗欲用郭待舉等參知政事既而謂崔知溫曰待舉等歷任尚淺未可與卿等同稱遂令於中書門下同承受進止平章事以此言之平章事亞於參知政事矣今榖不能逺引漢御史大夫亞丞相故事為對翻以參知政事為下丞相一等榖失之矣議者惜之余以謂凡此官稱皆唐一切之制非有髙下等級著為定令也亦何常之有至唐中葉以後雖左右僕射不兼平章事皆不為宰相則平章之重也久矣故本朝因之既政事自中書門下出則平章事固中書門下之長官也御史臺自為風憲之地今一旦以御史大夫厠於中書門下之列獨不為紊亂乎如必用漢制者則丞相以下舉易其名可也史臣之論亦未為允凡帶職諸學士結銜皆在官上待制修撰乃在官下宣和間薛太尉昻罷節度使改授資政殿大學士時寄祿官已至特進故特結銜在官下其後遂為故事特進授學士結銜皆在下云詩人之盛莫如唐故今唐人之詩集行於世者無慮數百家宋次道龍圗所藏最偹嘗以示王介甫且俾擇其尤者公既為擇之因書其後曰廢日力於是良可歎也然欲知唐人之詩者眂此足矣其後此書盛行於世唐百家詩選是也陳參政去非少學詩於崔鶠德符嘗請問作詩之要崔曰凡作詩工拙所未論大要忌俗而已天下書雖不可不讀然慎不可有意於用事去非亦嘗語人言本朝詩人之詩有慎不可讀者有不可不讀者慎不可讀者梅聖俞不可不讀者陳無已也滕龍圗逹道布衣時嘗為范文正公門客時范公尹京而滕方少年頗不羈往往潛出狹邪縱飲范公病之一夕至書室中滕已出矣因明燭觀書以俟意將愧之至夜分乃大醉而歸范公陽不視以觀其所為滕略無懾懼長揖而問曰公所讀者何書也公曰漢書也復問漢髙祖何如人公逡巡而入劉丞相莘老初拜右僕射表略曰命相之難為邦所重惟皇盛世尤慎此官君臣賡歌今百三十載勳業繼踵裁五十二人劉公拜相實元祐五年庚午距今紹興十年庚中五十年矣繼踵為相者又二十有八人通前凡八十人焉王荆公司馬溫公吕申公黃門韓公維仁宗朝同在從班特相友善暇日多會於僧坊往往談燕終日他人罕得而預時目為嘉祐四友吕太尉惠卿赴延安帥道出西都時程正叔居里中謂門人曰吾聞吕吉甫之為人久矣而未識其面明旦西去必經吾門我且一覘之逮旦了無所聞詢之行道之人則曰過已久矣而道旁多不聞者正叔歎曰夫以從者數百人馬數十行道中而能使悄然無聲馭衆如此可謂整肅矣其立朝雖多可議其才亦何可掩也太僕寺總諸馬監斥賣糞土嵗入緡錢甚多常别籍之以待朝廷不時之需紹聖間宗室令鑠為太僕卿性勤吏事檢核出納未嘗少怠吏不能欺居數年積錢倍於常時至數十萬緡一日與其二以職事同對哲宗問聞馬監積錢甚多其數幾何令鑠唯唯再問則對曰容契勘别具奏聞既退其二怪之問曰公平時鈎校簿書如此其勤今日上問奈何不以實對令鑠歎曰天子方富於春秋以區區馬監而聞積錢如此其多謂天下之富稱是吾故不對懼啓上之侈心也二謝非所及此事先公言之政和中杜相充以列卿使遼時新更左右僕射為太宰少宰既至遼館伴者問南朝新定宰相官名亦有據乎杜曰曽讀周禮否遼人不悅曰周禮豈不嘗讀正以周官太宰卿一人則天官之長也小宰中大夫二人其屬耳安得相抗而為二宰哉杜無以應及還以失言被黜近嵗使相節度使惟加檢校封邑則降麻若除知判州府止舍人命詞領宫觀又止降敕唐中葉以後宰相兼判度支最為重任國朝開寶五年嘗命參知政事薛居正兼提點三司淮南江南諸路水陸轉運使吕餘慶兼提點三司荆湖廣南諸路水陸轉運使明年薛拜相仍領轉運使事又命平章事沈義倫兼提點劔南轉運使蓋襲唐之遺制也仁宗朝司馬溫公為諌官以天下財用不足建請置總計使用輔臣領之以總天下之財紹興初孟觀文庾以參知政事兼總制户部財用然不入銜宣和中三公三孤皆具太師三人蔡京童貫鄭紳太傅一人王黼太保二人鄭居中蔡攸少師一人梁師成少傅一人余深少保二人鄧洵武楊戬景德四年詔皇姪武信軍節度使惟吉立班在鎮安軍節度使石保吉之上惟吉保吉俱帶平章事而保吉先拜真宗令史館撿討故事準唐武德中詔宗姓宜在同品官之上從之今職制令敘位以國姓為上雖非宗室而同姓皆居庶姓之右余頃見史院神宗國史藁富韓公傳稱少時范仲淹一見以王佐期之蔡太師大書其旁曰仲淹之言何足道哉宣和中王鼎為刑部尚書年甫三十時盧樞密益盧尚書法原俱為吏部侍郎而並多髯王嘲之曰可憐吏部兩胡盧容貌威儀總不都盧尚書應聲曰若要少年並美貌須還下部小尚書聞者以為快近世士大夫家祭祀多茍且不經惟杜正獻公家用其逺祖叔廉書儀四時之享以分至日不設倚卓唯用平面席褥不焚紙幣以子弟執事不雜以婢僕先事致齋之類頗為近古又韓忠獻公嘗集唐御史鄭正則等七家祭儀參酌而用之名曰韓氏參用古今家祭式其法與杜氏大略相似而參以時宜如分至之外元日端午重九七月十五日之祭皆不廢以為雖出於世俗然孝子之心不忍違衆而忘親也其説多近人情最為可行張文定公安道平生未嘗不衣冠而食嘗暑月與其壻王鞏同飯命鞏褫帶而已衫帽自如鞏顧見不敢公曰吾自布衣諸生遭遇至此一飯皆君賜也享君之賜敢不敬乎子自食某之食雖􅙳衣無害也范忠宣公守許昌鄒侍郎志完為教授嘗因宴集吏請樂語公命鄒為之鄒辭以為備官師儒而為樂語恐非所宜公深引咎謝焉自是大相知元符中鄒以諌官論立后事由是知名然世所傳疏其辭詆訐蓋當時小人偽為之以激怒者也其子柄後因賜對首辨此事且繳元疏副本上之詔以付史館豫嘗得見之緩而不迫薰然忠厚之言也李修撰夔丞相綱之父也政和中除守南陽迓者至問帑廩所積幾何吏對尚可支半年夔驚曰吾聞國無三年之儲國非其國也今止半年何可為哉即日上章請宫祠趙畯字德進宋城人少治易時龔深甫易解新出世未多見畯聞考城一士人家有之則徒步往見獨攜餅十數枚以行既至其門求見主人問以借書之事意頗以為難而命之飯畯辭曰所為來者欲見易解耳非乞食也主人嘉其意方許就傳因館之一室中畯闔户晝夜寫録飢則啖所攜之餅數日而畢歸書主人長揖而還先公應舉時與之同場屋其被黜之明日往唁之叩門久方應窺其何為則抄書如平時其勵志如此後數年始登科然迄以剛故寡所合先公初秉政薦為敕令所刪定官方改京秩晚節益不喜仕築室南都城北杜門不交人事有園數畝雜植花木日居其間鄉人目之為獨樂園然晚復再娶年頗相懸劉待制器之戲曰豈謂獨樂園中乃有少室山人乎建炎初鄉人競為遷徙計畯獨留鄉里自如及劉豫僣號起為郎官聞命不食數日而卒時年七十餘矣國朝應差遣多結銜在官上內則如樞密使副使三司使外則如轉運使副使提點刑獄皆然官制後悉移在下惟奉使外國者猶如故近嵗皆在下矣吳少宰敏政和間為中書舍人年方二十八後為給事中罷宣和末年復召為給事中內禪之夕驟拜門下侍郎未幾遷知樞密院明年遂拜少宰時三十八數月之間周歷三省樞密院頃所未有也范僕射宗尹為參知政事時年三十一拜相時三十二卒時三十九然有五子皆已娶婦兼有孫數人論者謂其享年雖不永而人間之事略備豈物理亦有乘除也歟劉貢甫舊與王荆公遊甚欵荆公在從班貢甫以館職居京師每相過必終日其後荆公為參知政事一日貢甫訪之值其方飯使吏延入書室中見有藁草一幅在硯下取視之則論兵之文也貢甫性強記一過目輒不忘既讀復置故處獨念吾以庶僚謁執政徑入其便坐非是因復趨出待於廡下荆公飯畢而出始復邀入坐語久之問貢甫近頗為文乎貢甫曰近作兵論一篇草創未就荆公問所論大概如何則以所見藁草為巳意以對荆公不悟其嘗見已之作也默然良久徐取硯下藁草裂之蓋荆公平日論議必欲出人意之表茍有能同之者則以為流俗之見也蘇黃門子由南遷既還居許下多杜門不通賔客有鄉人自蜀川來見之伺候於門彌旬不得通宅南有叢竹竹中為小亭遇風日清美或徜徉亭中鄉人既不得見則謀之閽人閽人使待于亭旁如其言後旬日果出鄉人因趨進黃門見之大驚慰勞久之曰子姑待我於此翩然復入逮夜竟不復出范忠宣謫居永州客至必見之對設兩榻多自稱老病不能久坐徑就枕亦授客一枕使與已對卧數語之外往往鼻息如雷客待其覺有至終日迄不得交一談者先公守南都時有直祕閣張山者開封人判留司御史臺事年八十餘矣視聽步履飲食悉如少壯或問何術至此曰吾無他術但頃常遇異人授一藥服之數十年未嘗一日輟耳其法用香附子薑黃甘草三物同末之沸湯點晨起空心服三四錢名降氣湯以為人所以多疾病者多由氣不降故下虛而上實此藥能𨗳之使歸下爾鄉人有效之者或反致虛弱蓋香附子薑黃瀉氣太甚而然不知山何以獨能取效如此意其别有他術特託此藥以罔人及渡江見一武官王升者亦七十餘矣康強無疾問何所服食則與山正同而後知人之於藥各有所宜不可強也唐史載姚崇為相與張説不協他日朝崇曵踵為有疾狀帝召問之因得留語又蔣伸為翰林學士宣宗雅曖信一日因語合旨三起三留曰他日不復獨對卿矣伸不喻未幾以本官同平章事以此言之則唐宰相不得獨對矣本朝宰執日同進呈公事遇欲有所密啓必先語閣門使奏知進呈罷乃獨留謂之留身此與唐制頗異趙康靖公槩既休致居鄉里宴居之室必置三器几上一貯黃豆一貯黑豆一空又間投數豆空器中人莫喻其意所親問之曰吾平日興一善念則投一黃豆興一惡念則投以黑豆用以自警始則黑多於黃中則黃多於黑近者二念俱忘亦不復投矣仁宗一日語輔臣曰聞富弼在青州以賑集流民為名聚衆十餘萬人且為變如何衆未及對時王文安公堯臣為參知政事越次進曰陛下何以知之仁宗曰姑言何以處無問所從得也公固請不已仁宗曰有內臣出使回言之公曰富弼本以忠義聞天下豈應有此但內臣敢誣大臣而罔主聽如是不治則亂之道也仁宗寤立黜宦者功臣號起于唐德宗時朱泚之亂既平凡從行者悉賜號奉天元從定難功臣其後凡有功者咸被賜寖相踵為故事本朝循此制宰相樞密使初拜賜焉參知政事樞密副使初除或未賜遇加恩乃有之刺史以上止加階勳勳髙者亦或賜中書樞密賜推忠協謀同德佐理餘官則推誠保德奉義翊戴掌兵則忠果雄勇宣力外臣則純誠順化每以二字協意或造或因取為美稱宰臣初加即六字餘並四字其進加則二字或四字多者有至十餘字又有崇仁佐運守正忠亮保順宣忠亮節之號文武迭用焉中書樞密所賜若罷免或出鎮則改亦有不改者其諸班直禁軍將校賜拱衛供奉之號遇加恩但改其名不過兩字元豐中神宗既纍却羣臣尊號之請大臣將順因請并罷功臣之名詔從之近嵗始復以賜大將皆創為之名非復舊制矣元豐官制既罷館職獨置祕書監少監丞郎著作郎佐郎校書郎正字謂之祕書省職事官然不兼領他局專以校讎著撰為職元祐間復置館職又詔輔臣悉舉所知榮試於學士院已乃隨官秩資序或授以祕閣集賢校理或領內外職任不必專在館中校書郎正字凡試中者滿二年乃授校理紹聖初復罷之建炎間張參政守建請復召試館職然既試止除祕書省職事官而校理直院之職迄不復置蓋考之不詳也元祐執政大抵欲參用祖宗官制既復館職又俾侍從官咸帶職為之任尚書二年乃除直學士御史中丞至諌議大夫滿一年除待制而以職為行守試時議者多以為無益事實而徒為紊亂然余觀元豐官制既職事官各有雜壓則既上者不可以復下故自六尚書翰林學士而除中丞六曹侍郎而除給舍諌議非不美而不免為左遷若使帶職而為之則無此嫌矣如蘇黃門自翰苑除中丞帶龍圗閣學士鄭閎中穆嘗為給事中後復以寶文閣待制為國子祭酒及前執政入為尚書皆帶殿學士之類既近於為官擇人之義且於人品秩無傷此則帶職為便其餘自依官制可也在京局務各隨其類有所𨽻給事中本通進銀臺司之任則進奏院𨽻焉諌官以言為職所以通天下之壅塞則登聞鼓院檢院𨽻焉祕書省著作局掌書日歷則太史局𨽻焉太常禮樂之司則教坊𨽻焉包孝肅公之尹京也初視事吏抱文書以伺者盈庭公徐命闔府門令吏列坐階下枚數之以次進取所持案牘遍閲之既閲即遣出數十人後或雜積年舊牘其間詰問辭窮蓋公素有嚴明之聲吏用此以試且困公公悉峻治之無所貸自是吏莫敢弄以事文書益簡矣天府雖稱浩穰然事之所以繁者亦多吏所為本朝稱治天府以孝肅為最者得省事之要故也元祐初再復制科獨謝悰中格特賜進士出身補大郡職官悰具狀辭免云所有告敕未敢祗受而以祗為祗以受為授士大夫間傳以為笑諌官劉器之疏論之曰昔唐之省中有伏獵侍郎為嚴挺之所譏而罷今陛下方當右文之代初復制舉豈容有袛授賢良乎悰字公定希深之孫亦有文采袛授蓋筆誤也熙寧間蘇丞相奉使契丹道過北京時文潞公為留守燕會欵洽公因問魏收有逋峭難為之語人多不知逋峭何謂蘇公曰聞之宋元憲公云事是木經蓋梁上小柱名取有折勢之義耳蘇公以文人多用近語而未及此乃用是語為一詩紀席上之事獻文公曰髙燕初陪聽拊鼙清談仍許奏揮犀自知伯起難逋峭不及淳于善滑稽舞奏未終花十八酒行先困玉東西荷公德度容狂簡故敢忘懷去町畦公卿三品以上既薨其家録行狀上尚書省請諡考功移太常禮院議定博士撰議考功審覆剌都省集合省官參議具上中書門下宰臣判凖始録奏聞敕付所司即考功録牒以未葬前賜其家省官有異議者聽具議以聞然故事集議日請諡之家例設酒饌厥費不資或者憚此因不復請景祐中宋宣獻公判都省建言考行易名用申勸沮而饗其私饋頗非政體請自今官給酒食從之然亦有其家不自請而人為之請而得諡者若楊侍讀徽之既卒久之其外孫宋宣獻公為請而諡文莊宋尚書祁既薨張安道為請而諡景文張公既薨遺命毋得請而蘇黃門子由援此二例為言遂諡文定兵興以來請諡之禮幾廢張慤中書卒汪翰林藻為之請遂諡忠穆然有司自定而已非復集官參議國朝以來凡諡者多褒其善而己未有貶其惡者惟錢文僖惟演初請諡博士張瓌議以為惟演嘗坐黨附外戚及妄議祔廟為憲司所糾左降偏郡位兼將相而貪慕權要因合敏而好學貪以敗官二法諡曰文墨其子曖訴于朝禮官議以為惟演自左降後能率職自新應追悔前過之法宜諡曰思其後曖等復訴不已競改文僖陳執中丞相初請諡韓持國黃門時為博士合寵祿光大不勤成名二法諡之曰榮靈張文定公疏論其非因詔太常再議衆禮官議應不懈于位之法曰恭考功楊南仲請諡曰恭襄何剡密直請諡為厲屯田員外郎黃師旦乞諡為榮尚書省衆議從恭詔從衆議凡侍從官以上乞致仕者雖優進官資而不許帶職熙寧中始許仕者仍帶舊職於是王懿敏公素首以端明殿學士致仕未幾歐陽文忠公又以觀文殿學士太子少師致仕會韓魏公寄詩賀之公和篇曰報國勤勞已蔑聞終身榮遇最無倫老為南畝一夫去猶是東宫二品臣侍從籍通清切禁嘯歌行作太平民欲知念舊君恩厚二者難兼始兩人蓋謂是也官制行職事官致仕仍許帶職事官著為令唐制禮部郎官掌百官箋表故謂之南宫舍人國朝常擇館閣中能文者同判禮部便掌箋表有印曰禮部名表之印王文恭圭初以館職為之其後就轉知制誥又就遷學士仍領辭不受曰御史中丞嵗時率百官上表而反令學士舍人掌詔誥之臣主為繕辭定草既輕重不倫亦事體未便今失之尚近可以改正欲乞檢會舊例以禮部名表印擇館職中有文者付之則名分不爽矣議者是之及官制行遂復唐之舊云李才元大臨仕仁宗朝為館職家貧甚僮僕不具多躬執賤役一日自秣馬會例賜御書使者及門適見之嗟嘆而去歸以白上上大驚異他日以語宰相遂命知廣安軍劉原甫為賦詩美其事熙寧中為知制誥坐封還李定除御史詞頭與宋次道蘇子容俱得罪於是名益重云待詔先生窮巷居簞瓢屢空方晏如自探井臼秣羸馬却整衣冠迎賜書王人駐車久歎息天子聞之動顔色飽死曽不及侏儒牧民會肯輸筋力詔書朝出蓬萊宫繡衣還鄉由上衷君今已作二千石亦復將為第五公右原父贈才元詩也却掃編卷中
