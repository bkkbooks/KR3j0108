body:
  text: 却掃編卷上宋徐度撰漢初因秦官置丞相太尉武帝罷太尉不置乆之置大司馬而以為大將軍之冠成帝復罷丞相御史大夫而取周官六卿司徒司空之名配大司馬以備三公而咸加大稱後漢建武二十七年復改大司馬為太尉而司徒司空並去大字自後歴代因之政和中始盡遵周官置少師少傅少保為三孤太師太傅太保為三公而以太尉為武官禮秩同二府大略如昔之宣徽使而不以授文臣而必以冠節度使為異耳唐開元中始聚書集賢院置學士直學士直院總之又置大學士以寵宰相自是不廢其後又置𢎞文館亦以宰相為大學士本朝避宣祖諱易為昭文然必次相遷首相始得之其後惟王章恵隨龎莊敏籍韓獻肅絳皆初拜直除昭文故王岐公行獻肅制詞有曰度越徃制何愛隆名之私者葢謂是也文臣簽書樞宻院始於石元懿初稱樞宻直學士簽書樞宻院事竟以本院學士而簽書院事而已至張公齊賢王公沔皆直以諌議大夫為之不復帶學士自是不復除至熈寜八年曽公孝寛始復自龍圗閣直學士起居舎人樞宻都承㫖拜樞宻直學士簽書樞宻院事而不遷官不賜毬文帶未幾以憂去位至服闋乃以端明殿學士判司農寺元祐三年趙公瞻自中散大夫户部侍郎六年王公巖叟自左朝奉郎龍圗閣待制權知開封府七年劉公奉世自左朝請大夫寳文閣待制權户部尚書皆拜樞宻直學士簽書樞宻院事不遷官趙公明年乃遷中大夫同知樞宻院事王劉二公至罷皆除端明殿學士是四公於從班中資品尚淺而躐遷執政故有是命葢不盡以執政之理畀之而必帶樞宻直學士者正用石元懿故事也紹聖以還又復除淵聖受禪之初亟擢宮僚耿南仲為執政而西府適無闕員故復自徽猷閣直學士太子詹事拜簽書未幾復欲命一執政使金而在位者皆不可遣遽以兵部尚書路公允廸為簽書而行先是樞宻直學士已廢不置改為述古殿直學士故二公皆超拜資政殿學士雖簽書帶職猶用故事而非本意矣自是遂相踵成例凡簽書者必帶端明資政之職至六曹尚書翰林學士皆執政之亞徑遷同知可也然初拜亦必為簽書而帶學士職疑非是武臣簽書樞宻院始於楊守一端拱元年自内客省使宣徽北院使為之二年張遜自鹽鐵使亦以宣徽北院使為之景徳三年韓崇訓自樞宻都承㫖四方館使以檢挍太傅為之同時馬正恵公知節自樞宻都承㫖東上閣門使以撿挍太保為之天禧三年曹武穆公瑋自華州觀察使鄜延副總管以宣徽北院使為之明道二年王武恭公徳用自歩軍副指揮使福州觀察使以撿挍太保為之治平三年郭宣徽逵自殿前都虞候容州觀察使以撿挍太保為之建炎三年王淵自嚮徳軍節度使御營都統制直以節度使為之童貫之始入樞府也官已為開府儀同三司而但以為權簽書樞宻院河西北面房公事頃之乃進稱權領葢以謂所掌止邊防一事且姑使為之而已又數月乃正稱領樞宻院事自是不復改其後蔡攸以少師居樞府亦稱領鄭太宰居中以故相居樞府亦稱領宣和間凡官品已髙而下行職事者皆稱領如蔡行以保和殿大學士領殿中省髙俅以開府儀同三司領殿前司王革以保和殿大學士領開封尹之類是也靖康間何丞相栗以資政殿學士李丞相綱以資政殿大學士皆領開封府職事而别置尹初貫之不稱知而稱領者非尊之也葢猶難使之正居執政之位故創此名然鄧樞宻洵武以少保知院而實居其下慶歴間呂許公以首相兼判樞宻院事論者以為判名太重未幾改兼樞宻使元豐官制廢樞宻使不置則知院為長官今領居知上則判院之任也按漢制有領尚書有平尚書領尚書則將軍大司馬特進為之平尚書則光禄大夫諫大夫之徒皆得為之則領之為重也乆矣字文樞宻虛中自資政殿大學士以本職簽書樞宻院事自陳職名太髙於是除去大稱而直以學士為之國朝中書宰相㕘知政事多不過五員兩相則三叅三相則兩㕘咸平中呂文穆李文靖向文簡三相也王文正王文穆兩叅也景祐間呂文靖王文正曽兩相也宋宣獻綬蔡文忠齊盛文肅度三叅也至和中文潞公劉丞相沆富文忠三相也王文安堯臣程康穆戡兩㕘也熈寜中曽魯公陳秀公升之兩相也王荆公韓康公唐質肅三叅也父子秉政國初至靖康元年凡十二家王恵獻化基叅知政事子安簡舉正㕘知政事呂文靖宰相子恵穆公弼樞宻使正獻公著宰相石元懿樞宻使子文定中立叅知政事陳給事恕叅知政事子恭公宰相韓忠獻億叅知政事子獻肅絳宰相持國門下侍郎莊敏緽宰相范文正㕘知政事子忠宣宰相彜叟尚書右丞曹武恵彬樞宻使子武穆瑋樞宻副使蔡丞相確子懋尚書左丞蔡太師宰相子攸領樞宻院事韓忠獻宰相子儀公宰相曽宣靖宰相子令綽簽書樞宻院王侍郎博文同知樞宻院子忠簡疇樞宻副使呂文靖之老也以司徒監脩國史兼譯經潤文使毎有軍國大事與中書門下樞宻院同議以聞正獻之老也復以司空同平章軍國事曽令綽之為簽書宣靖猶康寜遂就飬東府士林尤以二家為盛事兄弟秉政國初至政和凡七家陳文忠尭叟樞宻使弟文恵堯佐宰相三韓已見二呂已見二范已見呉正肅育叅知政事弟正憲充宰相蔡太師弟元度卞知樞宻院鄧觀文洵仁尚書右丞弟少保洵武知樞宻院祖孫秉政國初至紹興凡四家梁丞相適孫才甫子羙中書侍郎呂正獻孫舜徒好問尚書右丞富文忠孫季申直柔同知樞宻韓儀公孫似夫肖胄簽書樞宻叔姪秉政國初至大觀凡三家呂文穆䝉正宰相姪文靖已見胡文恭宿姪宗愈尚書右丞林文節希同知樞宻姪攄中書侍郎初置觀文殿大學士也詔自今非嘗歴宰相不除著為令宣和七年先公自北門召為上清寳籙宮使忽有此授方引故事退避㑹北鄙之警有詔復留明年京師解嚴復召為中書侍郎遂拜相時前告猶寄北京左藏庫淵聖遣中使取以賜先公先公復力辭曰臣今忝備宰輔於此告受與不受未有損益然所以終不敢當者葢以除授之日猶未經歴其於彜制終有所妨重失此名於天下也儻聽臣言使中外聞之知朝廷於祖宗法度無有大小率循惟謹顧不美乎上終不許先公不得已受之謝表略曰知章兩命之兼榮足為盛事張説大稱之獲免有媿前脩葢謂是也唐以宰相兼太清宮使本朝祥符間亦以首相領玉清昭應宫使又置景靈宫㑹靈祥源觀使以次相及樞宻使次第領之執政為副使侍從為判官天聖初昭應宫災始罷輔臣宮觀等使名政和中詔天下咸建神霄玉清萬壽宮復置使宰相使相領之執政為副使侍從為判官判官惟盛章嘗以開封尹領之它未嘗命而天下郡守皆兼管句通判兼同管句雖前二府領州亦如之葢欲重其事也輔臣既罷領宫觀使其後惟以使相節度宣徽使為之無所職掌奉朝請而已熈寜間又有以使居外者王荆公以使相領集禧觀使居金陵張文定公以宣徽南院使領西太一宫使居睢陽之類皆優禮也元祐間梁左丞燾罷政事除資政殿學士特創同醴泉觀使之名以命之梁公言故事無以學士領宫觀使者且同使之名前所未有力辭不受然自是前二府徃徃以學士直為宫觀使而同使之名不復除矣故事非宰相不為僕射雖樞宻使必嘗歴宰相乃得之天禧三年南郊親祠禮畢輔臣咸進官時丁晉公以吏部尚書㕘政事當遷乃以撿挍太尉兼本官為樞宻使而端揆之尊不可得也神宗即位覃㤙時王懿恪拱辰以端明龍圗兩學士吏部尚書留守北京當遷乃以為太子少保而兩學士如故官制行僕射為特進崇寜間許沖元太尉始以中書侍郎為之其後踵之鄭太宰鄧少保皆以知樞宻院為之薛肇明以門下侍郎為之靖康初復祖宗法度時薛獨存因改授金紫光禄大夫王銍言周世宗既定三關遇疾而還至澶淵遲留不行雖宰輔近臣問疾者皆莫得見中外恟懼時張永徳為澶州節度使永徳尚周太祖之女以親故獨得至臥内於是羣臣因永徳言曰天下未定根本空虛四方諸侯惟幸京師之有變今澶汴相去甚邇不速歸以安人情顧憚朝夕之勞而遲囬於此如有不可諱奈宗廟何永徳然之承間為世宗言如羣臣㫖世宗問曰誰使汝為此言永徳對羣臣之意皆願如此世宗熟視乆之歎曰吾固知汝必為人所教獨不喻吾意哉然吾觀汝之窮薄惡足當此即日趣駕歸京師嗚呼天命方有所属固非人謀之所能間也五代之亂天下無復學校皇朝受命方削平四方故於庠序之事亦未暇及宋城富人曹誠者獨首捐私錢建書院城中前廟後堂旁列齋舎凡百餘區既成􅌽楚丘戚先生主之先生名同文生唐天祐中歴五代入本朝皆不仕以文學行義為學者師及是四方之士争趨之曹氏益復買田市書以待來者先生乃制為學規凡課試講肄勸督懲賞莫不有法寜親歸沭與親戚還徃莫不有時而皆曲盡人情故士尤樂從焉由此書院日以寖盛事聞京師有詔賜名應天府書院先生沒門人私諡為正素先生其子綸復以儒學顯歴事太宗真宗兩朝官至樞宻直學士先生之規後傳於時及建太學詔取以㕘定學制予㓜時猶及見之書院即今之國子監也唐節度使初皆領一道故以本道為名若河西河南劔南關内之類是也厥後分鎮寖多所領不能盡有一道則以其地為名若安西朔方渭北隴右之類是也又有合數州以為名者若魏博淄青澤潞徐泗之類是也或因其有功則錫軍號以旌之若振武鎮國天雄定難之類不可悉數由五代以還至於國朝所錫益多凡曰節鎮皆曰某軍某軍而孟州曰河陽三城襄陽府曰山南東道太原府曰河東鳯翔府曰鳯翔揚州曰淮南江陵府曰荆南成都府曰劔南西川潼川府曰劔南東川興元府曰山南西道總九州府獨因舊以為名亦出於偶然本不以地望有所輕重然凡建節者反以是數州為重非親王尊屬與勲望重臣莫或得之故韓魏公以司徒領淮南曽魯公以司空領河陽三城文潞公以太師領河東皆以為重也唐之方鎮得專制一方甲兵錢穀生殺予奪皆屬焉權任之重自宰相之外它官葢無與比故其始拜也降麻告廷與宰相同而賜節鑄印之理又為特異誠以其任重故寵之本朝既削方鎮之權節度使不必赴鎮但為武官之秩間以寵文臣之勲舊内則為宫觀使外則别領州府而已至宗室戚里又止於奉朝請無復職掌而告廷賜節鑄印之禮猶踵故事至於今循之不革諸路經略安撫使雖非唐方鎮之比然亦大將之任也而命之與列郡守臣畧等間命宣撫使葢古之元帥也直以勑授尤為失之國初節度使猶有赴治所者謂之歸鎮以為異禮仁宗朝夏鄭公以平章事領三城節為西京留守以洛陽地當孔道日有將迎之勞表請歸鎮略曰凡叨建節之行頗以歸鎮為重葢謂是也蘇子容丞相始為南都從事時杜正獻公方致仕居南都見蘇公大噐之為道其平生出處本末甚詳曰子異時所至亦如老夫願勉旃自愛蘇公唯唯謝之先是鄭獻公既罷政出知兖州未㡬請老遂以太子少師致仕復三遷為太師而薨享年八十其後蘇公更踐中外其先後蚤晚多與杜公相似至免相也亦出知揚州未㡬請老復召為中太一宫使請不已乃以太子少師致仕遷太保而薨享年八十有二年壽官品又略同焉又熈寧間蘇公以集賢院學士守杭州時梁況之左丞方以朝官通判明州之官道出錢塘蘇公一見異之留連數日待遇甚厚既别復遣介至津亭手簡問勞且以一硯遺之曰石硯一枚留為異日玉堂之用梁公莫喻其意亦姑謝而留之自爾南北不復相見亦􅁯前事矣元祐六年梁公在翰苑一夕宣召甚急將行而常所用硯誤墜地碎倉卒取他硯以行既至則面授㫖尚書左丞蘇某拜右僕射梁公受命退歸玉堂方抒思命詞涉筆之際視所攜硯則頃年錢塘蘇公所贈也因恍然大驚是夕梁公亦有左丞之命他日㑹政事堂語及之蘇公一笑而已世謂貴人多識貴人葢以謂閲人多而識之然窮逹壽夭則或有可知之理而能纎悉如是二事者殆不可測也劉噐之待制對客多黙坐徃徃不交一談至於終日客意甚倦或請去輙不聽至留之再三有問之者曰人能終日矜莊危坐而不欠伸欹側者葢百無一二焉其能之者必貴人也葢嘗以其言騐之誠然韓康公王荆公之拜相也王岐公為翰林學士被召命詞既授㫖神宗因出手札示之曰已除卿㕘知政事矣國朝以來因命相而遂用草制學士補其處如此者甚多近嵗亦時有之世謂之潤筆執政本朝節度使雖不赴鎮然亦别降勅書宣諭本鎮軍民而為節度使者亦自給牓本鎮謂之布政牓親王亦翰苑為之近不復見矣元豐官制雖以侍中中書令尚書令為三省長官然未有為之者元祐初既召文潞公還朝以其名位已崇難所以處之者時司馬温公已拜左相而右相韓玉汝適去位宣仁后遂欲以潞公為右相謀之温公公曰文某歴事累朝年踰八十且其再為相時臣猶為小官今顧居其上不可因請自為右相而請以潞公為左相宣仁復難之於是用呂許公故事以本官同平章軍國重事且詔一月兩赴經筵六日一入朝因至都堂與執政商量事如遇有軍國機要事即不限時並令入預㕘决其餘公事只委僕射以下簽書發遣其後呂申公為右相請退甚力宣仁欲堅留之顧憐其老欲以為攝太保同平章軍國事手札以問范忠宣忠宣以為攝字從來止施於祠祭非所為官稱若别更一字而使毎至都堂不限時出東府執政有議事於便門過就之若議事遲乆令堂厨具食如此則事皆曲盡稱國家尊賢優老之意矣宣仁復手札謂以呂某徳望欲使兼一保傅官務要外恊人望實益勸講然其官去保傅甚逺欲以為行太保事如何忠宣復對曰謹按國朝典故天禧中宰臣王旦元是太保平章事以病乞退加太尉侍中今公著官是光禄大夫職是右僕射若以僕射加司空則與王旦相近於典故不逺若欲有益勸講則平章事乃是執政自當十月一赴經筵不必帶行太保事四字矣於是始定議云國朝宰相樞宻使必以侍郎以上為之若官舊尊則守本官官卑則躐遷侍郎官制行初相止除大中大夫崇寜後必超進數官政和以後至有徑遷特進者靖康初呉少宰敏初相自中大夫躐遷銀青光禄大夫引故事自言於是改大中大夫就職慶歴間賈文元為昭文相陳恭公為集賢相㑹乆旱引東漢䇿免三公故事自言是時呉正肅為㕘知政事與文元不恊數争議上前及此中丞髙若訥以為大臣不肅故雨不時若而文元亦自請故與正肅偕罷而恭公進位昭文猶申前請乃降授給事中而輔政如故二㕘宋元憲自給事中降諫議丁文簡自工部侍郎降中書舍人數月而復云國朝㕘知政事樞宻副使必以諫議大夫為之權御史中丞亦然熈寜中始有本官帶待制權中丞者官制後初拜執政遷中大夫而中丞不復遷官矣祖宗時侍從官或被寄任徃徃優進職名不復計資望之淺深慶歴中歐陽文忠公為知制誥纔數月出為河北都轉運使即拜龍圗閣直學士其有既命而以事不行者則隨亦改授他職紹聖間猶如此彭器資尚書自權吏部尚書授寳文閣直學士知成都府辭行乃改待制知江州權尚書補外正合得待制故也按歐陽文忠公慶歴制草序曰除目所下率不一二時已廹丞相出故不得專一思慮工文字以盡道天子難喻之意而還誥命於三代之文又劉原甫侍讀墓誌稱其文章尤敏贍嘗直紫徽閣一日追封皇子公主九人方將下直為之立馬却坐一揮九制凡數千言文辭典雅各得其體由是言之則是除目既下必用是日草詞且不得從容下直而為之也元祐初林子中樞宻除中書舎人言者論其非因及張􅃉明中書曰昨日聞主者督撰希告詞甚急意璪之為謀欲希早受命成其姦黨也則命詞之限當元祐時已不得如前者之廹矣翟公㢲資政居政和間詞命獨為一時之冠然文思遲澀尤惡人趣之有趣之者輒黙誌其旁凡一趣則故遲一日有遷延至旬餘者其後人稍聞之莫敢復趣矣帝者之女謂之公主葢因漢時之舊歴代循焉未之有改也政和間始采周之王姬之稱而改公主曰帝姬郡主曰宗姬縣主曰族姬議者謂姬葢周姓猶齊女曰齊姜宋女曰宋子皆因其姓而繫之國不曰周姬而曰王姬者葢别於同姓諸侯魯姬衛姬耳國家趙氏乃當曰帝趙不得曰帝姬若以姬為婦人之美稱則尤不可漢書髙五王傳諸姬生趙幽王友顔師古注曰諸姬總言衆妾之稱又非所以稱帝女也命婦封號亦政和間所改始因夫人之名而凡謂之人獨孺人者本稱婦人之名其它則見於書傳者皆通謂男子至碩人俁俁有力如虎執轡如組又非所以為婦人之號也小君之稱稽據甚明設欲多其等級者莫若采魏晉間鄉君亭君之目而増之則猶為有據也公主之號建炎初已復之予在司封欲援此為例并復命婦封號而或者以謂非事之急故止舊制諌議大夫積十一轉而至僕射二府乃七轉及官制行大中大夫七轉至特進而不分庶官與二府元祐中始令正議光禄銀青光禄金紫光禄大夫並置左右分為二資於是復十一轉而至特進紹聖以後因之不改政和中増置通奉正奉宣奉三階而罷分左右止十轉至特進而庶官二府並循此制葢祖宗以來二府不磨勘故毎優遷紹興新書乃并二府有磨勘法然亦未嘗舉行也石林公言吳中俚語若等人易得乆瞋人易得醜雖鄙亦甚有理祖宗時凡官僕射及使相以上領州府則稱判元符末章僕射罷相以特進守越州止稱知葢謫也宣和中余太宰深以少傳節度使守福州復稱知靖康初白太宰時中守壽春府李太宰邦彦守鄧州始復故事稱判建炎中呂僕射頥浩以使相守池守潭守臨安皆稱知趙丞相鼎官本特進再罷相初以節度使守紹興後改本官守泉皆稱知近嵗孟郡王忠厚以使相守鎮江亦稱知後改婺州㑹髙開府世則亦守温州稱判而孟亦改判婺州云國朝翰林學士多以知制誥乆次而以稱職聞者為之劉原甫居外制最乆既譽望髙一時故士論咸以為宜充此選而劉亦雅自負以為當得之然乆柅不得進逮出典兩郡還朝復居舊職且十年矣終不用乆之復請外補於是以翰林侍讀學士知永興軍頗怏怏不自得一日顧官屬曰諸君聞殿前指揮使郝質乎已拜翰林學士矣或以為疑者徐笑曰以今日之事凖之固當如此耳國家之制食邑滿萬户乃封國公惟見任宰相與官為三公者則通計實封滿萬便封國公杜正獻公既致仕因郊祀當加恩而食邑未滿萬户特詔封祁國公葢異禮也其後遺表有曰非萬户而忝賜履之封自三少而席司成之重葢謂是云楊文公億初入館時年甚少故事初授館職必以啓事謝先逹時公啓事有曰朝無絳灌不妨賈誼之少年坐有鄒枚未害相如之末至一時稱之故事臣僚封贈母祖母不問生歿並加太字曰太夫人太君政和間待制劉安上建言太者事生之尊稱也封母而别之所以致别於其婦既沒並祭於夫若加之尊稱則是以尊臨其夫也以尊臨夫於名義疑若未正自是始詔命婦追封並除去太字逮紹興新書復仍舊制晏尚書敦復領吏部援劉待制之言申明且引漢文帝紀七年冬十月令列侯太夫人夫人無得擅徴捕注謂列侯之妻稱夫人列侯死子復為列侯仍得稱太夫人葢此義也於是追封始不復稱太云按帝者之祖母稱太皇太后既升祔皆止稱皇后正此比也舊制執政以上始服毬文帶佩魚侍從之臣止服遇仙帶世謂之横金元豐官制始詔六曹尚書翰林學士並服遇仙帶佩魚故東坡謝翰林學士表曰寳帶重金佩元豐之新渥葢謂是也然武臣節度使班翰林學士上六曹尚書下至今止横金迨拜太尉則毬文佩魚葢㤙禮視執政故也元豐官制侍從官給事中以上乃服金帶中書舎人以下皂帶佩魚與庻官等大觀間始詔中書舍人諌議大夫待制皆許服紅鞓犀帶佩魚建炎間復置權六曹侍郎亦如之舊制借服不佩魚故繫銜止稱借紫借緋政和中王詔延康始建請借服皆佩魚如賜者從之然差勅止仍舊云可特差某職任仍借緋或借紫而已而其後繫銜者多自稱借紫金魚袋若借緋魚袋然終無所據也凡知州軍通判提㸃刑獄轉運判官知三京赤縣皆借緋知州提㸃刑獄自服緋者仍借紫轉運使副知節鎮州雖不服緋亦借紫謂之隔借自節鎮轉運副使改授列郡亦借紫謂之帶借中間嘗厯他官則不舊制凡特賜緋章服皆服塗金寳瓶帶三日職事官唯侍御史初除則例賜緋餘非特恩未有賜者本朝封爵徒為虛名户累數萬雖號實封者亦初無其實故有司亦不甚以為輕重若非自請則文臣例封文安武臣例封武功宗室例封天水名號重複不可稽考予以為雖異於古之裂地而封者然馭貴之意則均也謂宜略依古制非有功不封已封之縣不再以封則庻㡬其稍重矣故事文臣官至卿監官武臣官至横行而勲加至上柱國乃加封邑其後罷勲官而寄禄纔至奉直大夫横行以上便加封邑則宜其衆也集賢院學士初無班品與諸直館頗同然自執政侍從皆通為之如吳正肅公育自資政殿大學士改授集賢院學士判西京留司御史臺劉原父自翰林侍讀學士改集賢院學士判南京留司御史䑓皆以職閒無事故也其後李周自權侍郎罷除集賢院學士始有㫖曽任六曹侍郎者立班在大中大夫之上奏薦班列並同待制紹聖元年又詔曽任權侍郎以上者立班雜壓封贈在中㪚大夫之上其餘恩數儀制並依中㪚大夫餘人立班雜壓在中㪚大夫之下䕃補依朝議大夫官髙者從本條二年罷館職易為集賢殿脩撰政和中改集賢殿為右文今右文殿脩撰是也許少伊右丞宣和間初除監察御史夜夢緑衣而持䨇玉者隨其後未幾劉希范資政珏繼有是除靖康初為太常少卿復夢緋衣而持䨇玉者隨其後未幾劉亦繼為奉常時劉以淵聖登極恩初易章服也舊制宰相官僕射以上勑尾不書姓葢用唐故事也元豐官制僕射為宰相故不計寄禄官之髙下皆不書姓云本朝公卿多有知人之明見於擇壻與辟客葢趙叅政昌言之壻為王文正旦王文正之壻為韓忠憲億呂恵穆公弼呂恵穆之壻為韓文定忠彦李侍郎虛已之壻為晏元獻殊晏元獻之壻為富文忠弼楊尚書察富文忠之壻為馮宣徽京陳康肅堯咨之壻為賈文元昌朝曾宣靖公亮王文正曽守鄆辟龎荘敏籍為通判龎荘敏守并辟司馬温公為通判范文正公為陜西招討使辟田樞宻況孫威敏沔並為判官歐陽文忠公為掌書記歐陽公辭不就復請張文定公方平亦辭富文忠公守并請韓黄門維為屬王文安公堯臣安撫陜西辟蔡樞宻挺自隨如此之類甚多不可悉數皆㧞於稠人之中故其人居位風節徃徃相似前代所不及也童貫既敗籍其家貲得劑成理中丸幾千斤他物稱是此與胡椒八百斛者亦何異邪舊制進士登科人初官多授試秘書省校書郎故至今新擢第人猶稱秘校祖宗朝進士上三名皆授將作監丞通判故至今猶稱狀元為監丞唐東都有尚書省留守兼判其餘百司略如京師居其官者謂之分司大抵皆閒秩故當時有詩云猶被妻孥教漸退莫求致仕且分司是也本朝三京雖置御史䑓國子監執政侍從庻官迭居之職事甚簡御史䑓則行香拜表日押班國子監則出納錢糧而已故未置宫觀時士大夫多自請以為休息之地官制行後士大夫猶有自請分司者近嵗唯責降而已然不必居本京葢無供職之所故也舊制文臣丁憂起復必先授武官葢用墨縗從戎之義示不得已也故富鄭公以宰相丁憂起復初授冠軍大將軍餘官多授雲麾將軍近嵗起復者直授故官國朝創立諸閣以藏祖宗御製毎閣皆置學士直學士待制謂之侍從官然學士直學士例以閣名為官稱惟天章難以為稱初置時嘗以王贄為直學士其後不復有止除待制而已初諸閣唯龍圗有直閣館職之乆次與帥臣監司之有勤勞者乃得之然初無班綴也其後諸閣例置始編入雜壓與諸修撰通謂之貼職為之者衆矣范文正公為陜西招討使也以邊兵訓練不精葢無專任其責者又部署鈐轄等權任相亞莫相統一故毎有事宜職卑者付以懦兵逼逐先出位髙者各據精兵逗留不進是以屢致挫敗於是首分鄜延路兵以為六將將各三千餘人選路分都監及駐泊都監等六人各監教一將兵馬又選使臣指揮使十二人分𨽻六軍專掌教閲毎指揮選少壯勇健者二十五人先教之以弓弩短兵俟其技精則補為教頭毎人却俾分教十人以次相授一季之後盡成精兵遇有冦警少則路分都監將所部先出多則鈐轄都署領兩將或三將以出更出迭入約束既定總領不貳勞逸又均人樂為用邊偹寖修宼不敢犯矣其後諸路皆用此制熈寜將法葢本范公之遺意也唐之政令雖出於中書門下然宰相治事之地别號曰政事堂猶今之都堂也故號令四方其所下書曰堂帖國初猶因此制趙韓王在中書權任頗專故當時以為堂帖勢力重於勅命㝷有詔禁止其後中書指揮事凡不降勅者曰劄子猶堂帖也至道中馮侍中拯以左正言與太常博士彭惟節並通判廣州拯位本在惟節之上及覃恩遷員外郎時冦萊公為叅知政事知印以拯為虞部惟節為屯田其後廣州又奏仍使馮公繫銜惟節之上中書降劄子處分升惟節於上仍特免勘罪至是拯封中書劄子奏呈且論除授不當并訴免勘之事太宗大怒曰拯既無過非理遭降資免勘雖萬里之外争肯不披訴也且前代中書有堂帖指揮公事乃是權臣假此名以威福天下太祖已令削去因何却置劄子劄子與堂帖乃大同小異耳張洎對曰劄子是中書行遣小事文字猶京百司有符牒關刺與此相似别無公式文字可指揮常事帝曰自今但干近上公事湏降勅處分其合用劄子亦當奏裁方可行遣至元豐官制行始復詔尚書省已被㫖事許用劄子自後相承不廢至今用之體既簡易降給不難毎除一官逮其受命至有降四五劄子者葢初畫㫖而未給告先以劄子命之謂之信劄既辭免而不允或允又降一劄又或不候受告而俾先次供職又降一劄既命其人又必俾其官司知之則又降一劄謂之照劄皆宰執親押欲朝廷之務簡難矣然予觀近代公卿文集中凡辭免上章止云准東上閤門告報則是猶未有信劄也今諸路帥司指揮所部亦用劄子其體與朝廷略同然下之言上其非狀者亦曰劄子名同而實異不知其義何也國朝之制凡降勅處分事皆有詞其體與詔書相類知制誥行皆用四六文字元豐官制行罷之富韓公之薨也訃聞神宗對輔臣甚悼惜之且曰富某平生强項今死矣誌其墓者亦必一强項之人也卿等試揣之已而自曰方今强項者莫如韓維必維為之矣時持國方知汝州而其弟玉汝丞相以同知樞宻院預奏事具聞此語汗流浹背於是亟遣介走報持國於汝州曰雖其家以是相囑慎勿許之不然且獲罪先是書未到富氏果以墓誌事囑持國既諾之矣乃復書曰吾平生受富公厚恩常恨未有以報今其家見託義無以辭且業已許之不可食言雖因此獲罪所甘心也卒為之初持國年幾四十猶未出仕㑹富公鎮并門以帥幙辟之遂起其相知如此國朝故事文臣必帶直學士職乃服金帶熈寧中薛師正樞宻方以啇利被眷自天章閣待制權三司使始特膺是賜未幾韓荘敏丞相以龍圖閣待制為樞宻都承㫖繼得之政和宣和之間至有以庶官被賜者紛紛甚多不可殫紀名器之濫於是為極云傅獻簡公在英宗朝以諌官與吕獻可諸公論濮園稱號事甚切章凡十餘上未止㑹出使契丹既還而諸公皆已坐異議謫去而公獨遷侍御史知雜事公固辭曰臣今不獨不能與建議者同列於朝至如茍隨妄計者臣且不忍張目視之况與之同臺共職哉於是出知和州後數年丁憂服闋至京府時王荆公用事素善公謂公曰方今紛紛俟公來乆矣方議以待制知諌院還公公謝曰新法世不以為便誠如是當力論之平生未嘗欺敢以告荆公大怒乃以為直昭文館判流内銓未幾補外再閲嵗凡六徙困於道塗知不為時所容遂自請提舉西京崇福宫未幾復坐事奪官稍復監黎陽倉公日視事必親不以嘗清顯自待雖家人不見其憂愠色任滿管勾中嶽廟築室濟源盤谷蒔竹木㳺詠其間一時名士為之賦詩者甚多許洛舊老與之徃來悠然自適若將終身者再任管勾崇福宫元祐初還朝益不苟合乆之乃自吏部尚書遷中書侍郎凡二年薨于位皇祐初胡文恭公宿為知制誥封還楊懐敏復除内侍副都知詞頭不草翊日上謂宰相曰前代有此故事否文潞公對曰唐給事中袁髙不草盧杞制書近年富弼亦曽封還詞頭上意乃解而改命舎人草制已而䑓諌亦論其非其命遂寢而舍人封還詞頭者自爾相繼葢起於富成於胡也左右史雖日侍上側然未嘗接語欲有所論必奏請得㫖乃可元豐中王右丞安禮權脩起居注始有詔許直前奏事左右史許直前奏事葢自此始蘇黄門子由熈寧二年以前大名府推官上書論事神宗覽而悦之即日召對便殿訪問乆之面擢為條例司屬官故事選人未得上殿者自此遂為故事云吕申公素喜釋氏之學及為相務簡静罕與士大夫接惟能談禪者多得從容於是好進之徒徃徃幅巾道袍日逰觀寺隨僧齋粥談説禅理覬以自售時人謂之禪鑽云進士以累舉推恩特召廷試已而唱名次第賜進士或同學究出身或試監主簿諸州文學長史四門助教攝諸州助教謂之特奏名自景徳二年始是嵗進士第一人李文定丞相也其後亦有補三班借職者逐時不同然試而不中選罷歸職也顧憐其老而無成而遂捐一官與之此葢國朝忠厚之政也故事進士唱名宰執從官侍立左右有子弟與選者唱名之次必降階稱謝搢紳間頗以為榮事建炎初車駕在揚州㑹放進士時楊中立龍圗以侍讀侍立而其子遹以特奏名預唱名中立亦降階稱謝時遹之年已五十餘中立七十餘矣前此所無也却掃編卷上
