body:
  text: 却掃編雜家類三雜説之屬提要臣等謹案却掃編三卷宋徐度撰度字敦立穀熟人父處仁靖康時宰相書中稱先公者皆處仁也度南渡後官至吏部侍郎此編所紀皆國家典章前賢故事言頗詳核説部中之有禆史學者陸遊渭南集有是書跋曰此書之作敦立猶少年故大抵無紹興以後事蓋其書成于髙宗初年也王明清揮麈後録載明清訪度于霅川度與考定創置右府與揆路議政分合因革筆于是書又載其論哲宗實録及論秦檜刋削建炎航海以後日厯起居注時政記諸書二事則度之究心史學可以槩見至謂新唐書所載事倍于舊書皆取小説因欲史官博采異聞則未免失之泛濫此書上卷載葉夢得所記俚語一條中卷載王鼎嘲謔一條下卷載翟巽詼諧一條為例不純自穢其書是亦嗜博之一證矣然大致纂述舊聞足資掌故與揮麈諸録石林燕語可以鼎立而文簡于王事核于葉則似較二家為勝焉乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e46b3b980dc408d7b32b871a8a7ed9ad642009aa4224b4eefa69ac9d75a95728
