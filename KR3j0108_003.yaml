body:
  text: 却掃編卷下宋徐度撰京城士大夫自宰臣至百執事皆乗馬出入司馬温公居相位以病不能騎乃詔許肩輿至内東門葢特㤙也建炎初駐蹕揚州以通衢皆塼甃霜滑不可以乗馬特詔百官悉用肩輿出入范文正公自京尹謫守鄱陽作堂於後圃名曰慶朔未幾易守丹陽有詩曰慶朔堂前花自栽便移官去未曽開如今憶着成離恨秪託春風管勾來予昔官江東嘗至其處龕詩壁間郡人猶有能道當時事者云春風天慶觀道士也其所居之室曰春風軒因以自名公在郡時與之逰詩葢以寄道士云汪彦章言頃行淮西一驛舎中壁間有王荆公題字曰郵亭橋梁不脩非政之善飾厨傳以稱過使客又於義有不足如此足矣歐陽文忠公始自河北都轉運謫守滁州於瑯邪山間作亭名曰醉翁自為之記其後王詔守滁請東坡大書此記而刻之流布世間殆家有之亭名遂聞於天下政和中唐少宰恪守滁亦作亭山間名曰同醉自作記且大書之立石亭上意以配前人云東坡既南竄議者復請悉除其所為之文詔從之於是士大夫家所藏既莫敢出而吏畏禍所在石刻多見毁徐州黄樓東坡所作而子由為之賦坡自書時為守者獨不忍毁但投其石城濠中而易樓名觀風宣和末年禁稍弛而一時貴㳺以蓄東坡之文相尚鬻者大見售故工人稍稍就濠中摹此刻有苖仲先者適為守因命出之日夜摹印既得數千本忽語僚屬曰蘇氏之學法禁尚在此石奈何獨存立碎之人聞石毁墨本之價益増仲先秩滿攜至京師盡鬻之所獲不貲國朝財賦之入兩税之外多有因事所増條目甚繁當官者既不能悉其詳吏因得肆為姦利民用重困仁宗朝或請凡財賦窠名宜隨類併合使當官者易於省察可以絶吏姦論者皆以其言為然時程文簡公琳為三司使獨以為不可曰今隨類併合誠為簡便然既没其窠名莫可稽考他日有興利之臣必復増之則病民益甚矣於是衆莫能奪宗室令畤少有俊名一時名士多與之逰元祐間執政薦之簾前欲用以為館職曰令畤非特文學可稱吏能亦自精敏其為人材實未易得宣仁后曰皇親家惺惺者直是惺惺但不知徳行如何不如更少待於是遂止建炎間余避地饒州之徳興縣令畤時亦在焉自言如此國朝制科初因唐制有賢良方正能直言極諌經學優深可為師法詳明吏理逹於教化凡三科應内外職官前資見任黄衣草澤人並許諸州及本司觧送上吏部對御試䇿一道限三千字以上至咸平中又詔文臣於内外幕職州縣官及草澤中舉賢良方正各一人景徳中又詔置賢良方正能直言極諌博通墳典逹於教化才識兼茂明於體用武足安邊洞明韜略運籌决勝軍謀宏逺材任邊寄詳明吏理逹於從政等六科天聖七年復詔應内外京朝官不帶䑓省館閣職事不曽犯贓罪及私罪情理輕者並許少卿監以上奏舉或自進狀乞應前六科仍先進所業䇿論十卷卷五道候到下兩省看詳如詞理優長堪應制科具名聞奏差官考試論六首合格即御試䇿一道又置髙蹈邱園沉淪草澤茂才異等三科應草澤及貢舉人非工商雜類者並許本處轉運司逐州長吏奉舉或於本貫投狀乞應州縣體量有行止别無玷犯者即納所業䇿論十卷巻五道看詳詞理稍優即上轉運司審察鄉里名譽於部内選有文學官再看詳實有文行可稱者即以文卷送禮部委主判官看詳選詞理優長者具名聞奏餘如賢良方正等六科熈寧中悉罷之而令進士廷試罷三題而試䇿一道建炎間詔復賢良方正一科然未有應詔者哲宗初眷遇范忠宣公最厚元祐末再相屬宣仁上僊以舊臣例請退上再三堅留之不可則以觀文殿大學士知陳州陛辭上面諭曰有所欲言附遞以聞至陳乆之時元祐用事之臣投竄江湖皆已踰嵗即上章懇論請悉放還其辭略曰竊見吕大防等竄謫江湖已更年祀未䝉㤙㫖乆困拘囚其人等或年齒衰殘或素縈疾病不諳水土氣血向衰骨肉分離舉目無告將恐殞先朝露客死異鄉不惟上軫聖懐亦恐有傷和氣恭惟陛下聖心仁厚天縱慈明豈有股肱近臣簮履舊物肯忘軫惻常俾流離但恐一二執政之臣記其徃事嫉之太甚以謂今日之愆皆其自取啓廸之際不為詳陳殊不思吕大防等得罪之由只因持心失恕好惡任情以異已之人為怨讐以疑似之言為謗訕違老氏好還之戒忽孟軻反爾之言誤國害公覆車可鑑豈可尚遵前轍靡恤效尤哉章既上即束裝計程既逹且有命即大㑹僚佐中果被謫落職知隨州拜命畢交州事通判主席復就坐終宴而罷明日遂行王侍郎渙之常言乗車常以顛墜處之乗舟常以覆溺處之仕宦常以不遇處之無事矣東坡初欲為富韓公神道碑乆之未有意思一日晝寢夢偉丈夫稱是冦萊公來訪已共語乆之既即下筆首叙景徳澶淵之功以及慶歴議和頃刻而就以示張文潜文潜曰有一字未甚安請試言之葢碑之末初曰公之勲在史官徳在生民天子虛已聽公西戎北狄視公進退以為輕重然一趙濟能揺之竊謂能不若敢也東坡大以為然即更定焉王文安公堯臣登第之日狄武襄公始𨽻軍籍王公唱名自内出傳呼甚寵觀者如堵狄公與儕類數人立於道旁或嘆曰彼為狀元而吾等始為卒窮逹之不同如此狄曰不然顧才能如何耳聞者笑之後狄公為樞宻使王公為副適同時焉唐諸鎮節度使皆有上佐副使行軍長史司馬之類是也名位率與主帥相亞徃徃代居其任董晉以故相在宣武陸長源以御史大夫為之司馬裴晉公以宰相領彰義節度馬摠以刑部侍郎為之副使其後皆因補其處國朝咸平中張文定公齊賢以右僕射為邠寧環慶等州經略使兼判邠州而奏請户部員外郎直史館曽致堯為判官慶歴中西邊用兵始用夏英公以宣徽南院使為陜西經略招討使而韓魏公范文正公皆以雜學士為副使又别置判官皆唐之上佐類也其後逐路設經略安撫使亦置判官一員兵罷皆省熈寧中吕汲公建言今縁邊經略使獨任一人而無僚佐謀議之助雖有副總管鈐轄之屬皆奉節制備行陣非有折衝决勝之略預於其間朝廷毎除一帥幸而能得者則一路兵民實受其賜不幸不才與焉則是以三軍之衆一聽庸人所為也請諸路經略使各置副使或判官一人朝廷選差素有才略職司以上人充叅謀一人委經略使奏辟知邊事有謀略知縣以上人充葢自古設官必置貳立副者所以紓危難而適時用聚聰明而濟不及也如此則可用之士不以下位而見遺中材之帥又以人謀而獲濟兼得以博觀已試之効以備緩急之用不報建炎三年詔兩浙西路江南東路江南西路各置安撫大使浙西治鎮江府江東治池州江西治洪州又置叅謀叅議各一人自是之後諸路徃徃有之矣西京一僧院忘其名後有竹林甚盛僧開軒對之極瀟洒士大夫多逰集其間一日文潞公亦訪焉大愛之僧因具牓乞命名公欣然許之攜牓以歸數月無耗僧徃請則曰吾為爾思一佳名未之得也姑少待後半年方送牓還題曰竹軒余觀士大夫立所在亭堂名當理而無疵者極少潞公之語雖質然不可破也東坡初為趙清獻公作表忠觀碑或持以示王荆公公讀之沉吟曰此何語邪時客有在傍者遽指摘而詆訿之公不答讀至再三又攜之而起行且讀忽嘆曰此三王世家也可謂竒矣客大慙熈寧元豐間有僧化成者以命術聞於京師蔡元長兄弟始赴省試同徃訪焉時問命者盈門彌日方得前既語以年月率爾語元長曰此武官大使臣命也他時衣食不闕而已餘不可望也語元度曰此命甚佳今嵗便當登第十餘年間可為侍從又十年為執政然决不為真相晚年當以使相終既退元長大病不言元度曰觀其推步鹵莾如此何足信哉更俟旬日再徃訪之則可驗矣旬日復徃僧已不復記識再以年月語之率爾而言悉如前説兄弟相顧大驚然是年遂同登科自是相繼貴顯於元長則大謬如此而元度終身無一語之差以此知世所謂命術者類不可信其有合者皆偶中也錢龍圗昻性剛介最惡人過稱官秩曰近嵗士大夫例福薄或疑而問之答曰自已有官不自以為稱而妄取他人官而稱之豈非福薄邪翟資政公㢲喜嘲謔初為秘書郎同列多見侮誚時俞尚書栗亦同在省中嘗㑹飲明旦翟自外至抗聲問曰俞栗安在衆愕然俞亦自失翟徐曰吾問昨夕餘瀝欲復飲耳衆始大笑他日或諌止之翟曰同列相嘲戱三館之舊也吾欲修故事耳豈得已哉平日談論喜作文語雖對使令亦然為中書舍人時後省有庖者藝頗精翟極稱之後更懈怠衆以尤翟曰此小人也而公數稱奨之故令如此公自治之翟不得已呼使前責曰汝以刀匕微能數見稱賞而敢疎慢如此使衆人以驕灌夫之罪歸汝父於汝安乎左右皆匿笑而庖竟不觧為何等語也先公舊有小吏曰柴援自言周室之裔頗能詩嘗有寄逺詩曰别時指我堂前桞桞色青時望子時今日桞綿吹欲盡尚憑書去説相思又有客舍詩曰隻影寄空館蕭然飢鶴姿秋風北窓來問我歸何時其佳句可喜多此類先公屢欲官之未及而卒世謂詩能窮人此尤其甚者也歐陽文忠公為滑州通判有祕書丞孫琳者簽書判官事自言頃被差與崇儀副使郭咨均肥鄉縣稅嘗創為千步方田法公私皆利簡當易行未㡬召入為諌官㑹朝廷方議均稅因薦琳咨使試其法詔從其請起自蔡州一縣以方田法均税事方施行而議者多不言便遂罷後秉政適復有㫖置均税司命官分均陜西河北税命下兩路騷然民争斫伐桑棗逃匿又群訴於三司者至數千人公復上疏請罷之且言均税一事本是臣先建言聞今事有不便臣固不敢緘黙也事亦遂寢吕太尉惠卿元祐間貶建州紹聖初復起語人曰吾在謫籍九年雖冷水亦不敢飲設有疾病則好事者必謂吾戚戚所致矣汪彦章言頃有一士人忘其名初以進士登科後為法官至刑部侍郎嘗有表曰臣本實儒生初非法吏清朝奪其素守白首困於丹書雖以文辭自名者無以過也舊制召試館職詩賦各一篇治平中東坡被召自言乆去場屋不能為詩賦乃特詔試論二篇神宗時御史呉申言試館職止於詩賦非經國治民之急請罷詩賦試䇿三道問經史時務毎道問十事以上以通否定髙下去留於是詔自今試館職論一首䇿一道建炎再復試法唯䇿一道東坡既謫黄州復以先知徐州日不覺察妖賊事取勘已而有㫖放罪乃上表謝神宗讀至無官可削撫已知危笑曰畏喫棒邪張嵲舎人言桞子厚平生為文章專學國語讀之既精因得掇拾其差失著論以非之此正世俗所謂没前程者也又言子厚感遇二詩始終用太子事不知其何謂陜人薛公度言少時猶及見司馬温公自洛中來夏縣上冡鄉人皆集父老或請曰願聞資政講書以為鄉里之訓公欣然為講孝經庶人章元祐間蔡太師以待制守永興值上元隂雨連三日不得出遊十七日雨止欲再張燈兩夕而吏謂長安大府常嵗張燈所用膏油至多皆預為備今盡臨時營之决不能辦蔡固欲之或曰唯備城庫貯油甚多然法不可妄動亟命取用之已而為轉運使所劾時吕汲公為相見之曰帥臣妄用油數千斤何足加罪乎寢其奏不下桞永耆卿以歌詞顯名於仁宗朝官為屯田員外郎故世號桞屯田其詞雖極工緻然多雜以鄙語故流俗人尤喜道之其後歐蘇諸公繼出文格一變至為歌詞體製髙雅桞氏之作殆不復稱於文士之口然流俗好之自若也劉季髙侍郎宣和間嘗飯于相國寺之智海院因談歌詞力詆桞氏旁若無人者有老宦者聞之黙然而起徐取紙筆跪於季髙之前請曰子以栁詞為不佳者盍自為一篇示我乎劉黙然無以應而後知稠人廣衆中慎不可有所臧否也王保和革為開封尹專尚威猛凡盗一錢皆杖眷配流一日杖於市稠人中有擲書一冊其旁者亟取視之則其卧中物也因大驚捕逐竟不得宣和末河北盗起以選出守大名慘酷彌甚得盗輙殺之然盗愈熾革自以殺人既衆且懲開封之事常懼人圖已所居輒以甲士環繞然毎對客必焚香吕本中舍人時從辟為師屬私語曰此正所謂兵衛森畫㦸宴寢凝清香者也徃嵗吳中多詩僧其名徃徃見於前輩文集中予渡江之初猶見有規者頗以詩知名其為人性坦率其徒謂之規方外時年七十餘矣談論蕭散可喜臨終前數日有詩曰讀書已覺眉稜重就枕方欣骨節和睡起不知天早晚西牕殘日已無多葉左丞大愛之國朝故事叙班以宰相為首親王次之樞宻使又次之乾興中王沂公拜同平章事曹利用以樞宻使兼侍中充景靈宫使而沂公充㑹靈觀使遂班利用之下中外深以為失天聖二年王冀公卒沂公遷玉清昭應宫使張文節公知白以平章事兼㑹靈觀使及告謝皆集門廬候閤門定班次沂公當居首利用黙不言而忿形於色閤門乆不能决上意不欲特出指揮故但令有司裁定遣内侍監督乆之承明殿已坐請班首姓名欲先啓奏沂公乃抗聲曰但言宰臣王曽以下告謝班次始定熈寜初陳秀公升之拜相時文潞公以司空節度使兼侍中為樞宻使神宗以潞公三朝舊老欲優禮之故特詔班秀公上潞公引曹利用事力辭且言臣忝文臣粗知義理不敢亂朝廷尊卑之序㑹王荆公亦言非是曰宰相之上豈容有他官霍光功烈權勢雖盛然猶序宰相下上於是從潞公之請宣和間王黼以太傅秉政蔡攸以太保領樞密院皆以真三公居位未幾白李二相拜太少宰遂詔二公班攸之下其後黼罷相復詔二相居攸上猶用故事也舊制進士第三人以上及第人一任回並召試館職制科第三等人一任回亦然仍並陞通判資序熈寧初詔釐革並令審官院依例與差遣姚舜明侍郎初為華亭令民有為商者與一僕俱行踰期不歸其家訪之則已為人所殺僕亦逃去其家意僕之所為也捕得之執訴於官僕無以自明舜明詰其所以而不能言則械繫之廡下一日晨起聽訟而囚忽大哭舜明心疑之然未暇顧也訟者去呼囚問曰向何為哭囚曰適見訟者乃殺吾主者也問何以知之曰見其身猶衣郎之衣今失此人我必濫死矣是以哭耳舜明聞之憫然欲物色之未知其方是夕適與同官宴集飲罷宗室監酒務者數人共登後圃髙亭以憇有妓女不知人在亭上而溲於亭下宗室戯以物擊之則有白衣男子突起草間衆大驚亟命執之至則惶恐稱死罪曰殺商人者我也旦訴事於邑而忽心動因悸不能行而伏於此適見物墜於前疑以為捕今果見獲我固當死旦送邑中具得所掠物遂寘於法僕於是得釋蘇京字世美丞相子容之子也嘗為許州觀察判官時韓黄門持國知州事甚器愛之薦之於朝其辭曰竊見某人讀書知義理臨事有風力前輩之不妄稱人如此在外州府宫觀舊惟西京崇福宫南京鴻慶宫舒州靈仙觀鳯翔府上清太平宫兖州仙源縣景靈宫太極觀皆有提舉管勾官熈寧初始詔杭州洞霄宫永康軍丈人觀亳州明道宫華州雲䑓觀建州武夷觀台州崇道觀成都府玉局觀建昌軍仙都觀江州太平觀洪州玉隆觀五岳廟太原府興安王廟皆置又増判三京留司御史䑓國子監員葢以優士大夫之老疾不任職者而王荆公亦欲以寘異議之人也舊制諸路監司屬官曰勾當公事建炎初避今上嫌名易為幹辦時軍興一切所置官司數倍平時而皆有屬官所置縱横有題於傳舎者曰北去將軍少南來幹辦多宰相使相妻封國夫人執政節度使光禄大夫妻封郡夫人然不繫其夫之封爵有夫之爵方為郡公郡侯而妻為國夫人者有夫之爵方為縣伯子男而妻為郡夫人者又毎遇大禮則加封有夫為小郡小國公而妻為大郡大國夫人者皆恐非是翰林學士祖宗時多有别領他官如開封府三司使之類者不復歸院供視草之職故銜内必帶知制誥則掌詔命者也官制後雖不領他職然猶帶知制誥如故遇闕則以侍郎給舍兼直學士院近嵗有以尚書兼權翰林學士者而不帶知制誥議者謂不若止稱直學士院文臣換武諸司使以下則悉有定制正任以上則臨時取㫖比舊官多不遷故慶歴間范韓王龎四公皆以雜學士止得觀察使熈寧初王懿敏素以端明殿學士亦換觀察使建炎初孟郡王忠厚以徽猷閣直學士換承宣使邢開府煥以待制換觀察使非舊制也宰執生日禮物舊多差親屬押賜例有書送物則赴閤門繳書申樞宻院取㫖出劄子許收乃下牓子謝恩雖子姪亦然王荆公為相因生日差其子雱因上言父子同財理無饋遺取㫖謝恩皆偽作竊恐君臣父子之間為禮不宜如此請自今應差子孫弟姪押賜並不用此例從之宣和間童貫以太師領樞宻院事為河北東等路宣撫使有所陳請雖本院亦用申狀靖康間李丞相綱以知樞宻院事出為河北河東宣撫使始以謂既以輔臣出使不當復有所屈乃止用關關葢都省樞宻院自相徃來文移之稱也其體與劄子大同而小異樞宻院承㫖本吏人之名逐房又别置承㫖副承㫖舊得遞遷至承㫖太平興國七年以翰林副使楊守一為西上閤門使樞宻都承㫖加都字及用士人皆自此其後復止以吏為之熈寧三年乃復以皇城使端州團練使李綬充副都承㫖且詔見樞宻使副如閤門使禮葢以歴年不用士人接遇及所領職事都無可考驗故也未幾又請鑄印詔止許印在院文字不得别用以樞宻承㫖司印為文五年曽樞宻孝寛自尚書比部員外郎集賢校理同脩起居注為起居舎人充史館修撰兼樞宻都承㫖用文臣自此始其後多由此徃遷同知或簽書院事劉資政珏靖康間為太常少卿因檢視禮器庫見有故祭服甚多將建請以為戰士衲衣有老吏諌曰祭器弊則埋之祭服弊則焚之禮也奈何以為戰士衣乎劉嘿然無以應邵博公濟言吕文靖公為相其夫人馬氏因時節朝宫中慈聖謂曰今嵗難得糟淮白夫人家有之乎對曰有之容妾還家進入既歸索其家所有得二十合列之廡下文靖歸問何所用夫人對以中宫之言文靖命止進一合餘並留之夫人曰臣庻之家自相餉遺猶欲豐腆奈何靳之文靖曰此雖微物而禁中偶乏而吾家乃有如許之多可乎吾非靳也漢書陳勝傳勝攻陳陳守令皆不在獨與守丞戰譙門中晉灼曰譙門義闕顔師古曰譙門謂門上為髙樓以望耳樓一名譙故謂美麗之樓為麗譙譙亦呼為巢所謂巢者亦於兵車之上為巢以望敵也今流俗本譙字下有城字非也譙城已下矣劉貢甫以謂譙陳之旁邑此適譙之門耳猶今京師有宋門鄭門之類也又田横傳髙祖曰横來大者王小者侯師古曰大者謂横身小者其徒衆也劉貢甫以謂者則也古人之語多如此謂横來大則王小則侯耳方是時從起蜀漢功臣未盡封安得地封田横之徒衆乎葢劉原甫與原甫之子仲馮皆精於漢書毎讀隨所得釋之後成一編號三劉漢書其正前人之失皆此類也金人之始入冦也詔遣路樞宻允廸使河東割地有布衣王亢者與之有舊拉與偕行亢為人深目髙凖多髯髭毳裘氊笠獨騎而後時所在村民多自相保聚見亢以為敵也執之亢自辨數莫聽則欲縛送州縣亢不服旁一人曰爾不受縛吾且斷爾之臂亢仰而言曰幸斷我左臂或問何也亢曰右臂妨吾抓癢衆皆笑曰此伶人也乃得釋范龍圗純粹文正公之㓜子也守延安嘗大閲百姓入教場觀者皆禁俄而騎出兩翼圍之命觀者皆列坐五人結一保已而有十許人無保呼使前問故叩頭曰夏國之人也復問曰爾國使爾來覘我乎曰然因令坐帳前而後閲試技藝迨暮而畢復呼問之曰吾之兵不亦精乎曰然曰歸語爾主吾在此有以相待欲為宼者幸早來飲食而遣之世言文公三子各得其父一體葢長子忠宣得其徳量中子右丞純禮彜叟得其文學徳儒得其將略也邊人至今畏服焉憲衘起於唐中葉以後職官志記其所因甚略云至徳以後諸道使府叅佐皆以御史為之謂之外䑓按李光弼傳王承業為河東節度使政弛􅍝侍御史崔衆主兵太原毎狎侮承業光弼素不平及是詔衆以兵付光弼衆素狂易見光弼長揖不即付兵光弼怒收繫之㑹使者至拜衆御史中丞光弼曰衆有罪已前繫今但斬侍御史若使者宣詔亦斬中丞然則當天寳時諸道叅佐固已有御史之名不得云至徳後矣予嘗考之開元中宇文融由監察御史陳便宜請挍天下户籍收匿户羡田佐用度𤣥宗以融為覆田勸農使鈎挍悵符得為勲亡丁甚衆擢兵部員外兼侍御史融乃奏慕容琦等二十九人為勸農判官假御史分按州縣疑此為憲衘之始葢自後凡以他官被委任欲重其事者咸假以御史之名又因以賞功自方鎮及賔佐幕職下逮卒伍之長莫不領中丞大夫御史之名名器之濫莫甚於此本朝初尚因之故至今中丞猶有端公之稱葢謂是也元豐官制行悉罷然封拜蕃夷君長至今猶然湖州銅官廟偶象衣冠甚古其婦人皆如世所藏周昉畫人物葢唐人之遺蹟也翟公㢲尤愛之暇日多至廟中觀焉徃徃徘徊終日又嘗作大銅香爐施毗陵天寧寺塔下銘其上曰公㢲父作爐燎薰覺皇韓忠憲公平日常語子弟曰進取在於止足寵禄不可過溢年若至六十可以退身謝事歸守父母墳墓則是忠孝兩全矣及公薨其子康公服既闋將造朝自誓於墓前曰仕宦至六十決當乞歸田里洒掃墳壠期於不墜先訓及熈寜中以觀文殿學士守南陽年五十九矣遽欲謝事又以自來大臣引年徃徃不即賜可徒奏牘累上旋復視事故先手疏具述遺誡及誓於墓之事於上且曰昔晉王羲之為㑹稽太守去郡不仕亦嘗自誓於父母墓前朝廷以其誓苦不復召之臣今志願雖與羲之頗殊然誓於先臣墓前無異矣東晉固不足以比隆盛時所以保全臣下一節斯亦可尚臣區區之志中外士大夫多有知者即非臣今日輕有去就妄干退閒也然章屢上終不允迄不得如其志及元祐初方致仕時年七十五矣故士大夫以退為難官制行後凡大禮猶凖唐故事置五使大禮使則首相為之禮儀使則禮部尚書為之儀仗使則兵部尚書為之鹵簿使則御史中丞為之橋道頓逓使則京尹為之惟頓逓司例造酒分餉近臣京師稱頓逓司酒為最美徽宗朝五使皆用執政次第為之大觀元年明堂大禮先公以尚書右丞為橋道頓逓使宣徽使本唐宦者之官故其所掌皆瑣細之事本朝更用士人品秩亞二府有南北院南院資望比北院尤優然其職猶多因唐之舊賜羣臣新火及諸司使至崇班内侍供奉諸司工匠兵卒名籍及三班以下遷補假故鞫劾春秋及聖節大宴節度迎授恩命上元張燈四時祠祭契丹朝貢内庭學士赴上督其供帳内外進奉名物教坊伶人嵗給衣帶郊御殿朝謁聖容賜酺國忌諸司使下别籍分産諸司工匠休假之類武臣多以節度使或兩使留後為之又或兼樞宻文臣則前二府及侍從之官髙乆次有勲勞者方得之其居藩府則稱判其重如此元豐官制行罷宣徽使不置時為之者二人張文定公與王君貺也特命領使如舊其後君貺自請依執政置墳寺詔特依後母為例陳無已嘗以熈寜元豐間事為編年書既成藏之龎荘敏家無已之母龎氏也紹聖中龎氏子有懼或為已累者竊其書焚之世無别本無已終身以為恨焉彩選格起於唐李邰本朝踵之者有趙明逺尹師魯元豐官制行有宋保國皆取一時官制為之至劉貢父獨因其法取西漢官秩陞黜次第為之又取本傳所以陞黜之語注其下局終遂可類次其語為一傳博戯中最為雅馴初貢父之為是書也年甫十四五方從其兄原父為學怪其數日程課稍稽視其所為則得是書大喜因為序冠之而以為已作貢父晚年復稍増而自題其後今其書盛行於世司馬温公編修資治通鑑辟劉貢甫范純夫劉道原為屬兩漢事則屬之貢甫唐事則屬之純夫五代事則屬之道原餘則公自為之且潤色其大綱書成道原復類上古至周威烈二十二年以前事為通鑑前紀又將取國朝事為後紀前紀既成而病自度後紀之不復可成也更前紀為外紀史記載秦始皇及二世行幸郡縣立石刻辭世傳泰山篆字可讀者惟有二世詔五十許字而始皇刻辭皆謂已亡宋丞相莒公鎮東平日遣工就泰山橅得墨本以慶歴戊子嵗别刻新石親作後序止有四十八字歐陽文忠公集古録亦言友人江鄰幾守官奉髙親到碑下纔有此數十字而已其後東平劉斯立嘗登泰山絶頂訪秦篆徘徊碑下其石埋植土中髙不過四五尺形制似方而非方四面廣狹皆不等因其自然不加磨礲所謂五十許字者在南面稍平處人常所橅搨故士大夫多得見之其三面尤殘缺蔽闇人不措意隠隠若有字㾗刮磨垢蝕試令橅以紙墨漸若可辨葢四面起以東北南為次四面周圍悉有刻字總二十二行行十二字字從西面起以東北南為次西面六行北面三行東面六行南面七行其末有制曰可三字復轉在西南稜上其十二行是始皇辭其十行是二世辭以史記證之文意皆具計其缺處字數適同於是泰山之篆遂為全篇如親􅛍逺黎史作親廵逺方黎民金石刻作刻石著作休嗣作世聽作聖陲體作禮昆作後則又史家差誤皆當以碑為正其曰御史大夫者大夫也荘子曰且而屬之夫夫衛宏曰古文一字兩名因就注之斯立名跂丞相莘老之子善為文章晚榜所居室曰學易堂類其文為二十卷號學易集行於世漏澤園之法起於元豐間初予外祖以朝官為開封府界使者常行部宿陳留佛寺夜且半聞垣外洶洶若有人聲起燭之四望積骸蔽野皆貧無以𦵏者委骨於此意惻然哀之即具以所見聞請斥官地數頃以𦵏之即日報可神宗仍命外祖總其事凡得遺骸八萬餘毎三十為坎皆溝洫什伍為曹序有表總有圖規其地之一隅以為佛寺嵗輸僧寺之徒一人使掌其籍焉外祖陳氏名向字適中睦州人起白屋以才自見屢使諸路有能名官制初行為度支員外郎元祐初出為江西轉運副使徙楚州未幾卒賈魏公平生歴官多創制景祐元年始置崇政殿説書自都官員外郎首為之四年置天章閣侍講與趙希言王崇道首為之比直龍圗閣預内朝起居班在本官之上逓直侍講於邇英延義二閣在崇政殿庭廡下皇祐元年置觀文殿大學士寵待舊相公自使相首為之崇政殿説書本以待庶官之資淺未應為侍講者故熈寜初吕吉甫太尉曽子宣丞相始改京官即得之至元祐中范純夫翰林司馬公休諌議皆以著作佐郎直兼侍講宣和又置邇英殿説書命楊中立龍圗以著作郎為之近嵗初召尹彦明議所除官將以為邇英殿説書而議或以為祖宗時無有乃改崇政殿云予所見藏書之富者莫如南都王仲至侍郎家其目至四萬三千卷而類書之卷帙浩博如太平廣記之類皆不在其間雖秘府之盛無以踰之聞之其子彦朝云其先人毎得一書必以廢紙草傅之又求别本叅較至無差誤乃繕寫之必以鄂州蒲圻縣紙為册以其𦂳慢厚薄得中也毎冊不過三四十頁恐其厚而易壊也此本專以借人及子弟觀之又别寫一本尤精好以絹素背之號鎮庫書非已不得見也鎮庫書不能盡有纔五千餘卷葢嘗與宋次道相約傳書互置目錄一本遇所缺則寫寄故能致多如此宣和中御前置局求書時彦朝已卒其子問以鎮庫書獻詔特補承務郎然其副本具在建炎初問渡江書盡留睢陽第中存亡不可知可惜也官制初行李邦直為吏部尚書時寄祿官纔承議郎神宗以其太卑詔特遷朝奉大夫其後無踵其例者唐庚字子西眉山人善為文常以為六經已後便有司馬遷三百五篇之後便有杜子美六經不可學亦不湏學故作文當學司馬遷作詩當學杜子美二書亦須常讀所謂不可一日無此君也尤不喜新唐書云司馬遷敢亂道却好班固不敢亂道却不好不亂道又好是左傳亂道又不好是新唐書八識田中若有一毫唐書亦為來生種矣楊侍讀繪熈寜間知南京有恵政予及見故老有能道當時事者云春秋勸農時必微服屏騎從至田野中民莫知其太守也有獻漿水者欣然為舉之以是多知民間疾苦之實亦以見前輩為政平易如此也自古人君即位之次年改元以至終身漢文帝始以即位之十年為後元年景帝復以即位之七年為中元年又六年為後元年至武帝初年乃號建元年其後屢易其號以至於今雖立號紀年始於武帝然其源葢自文帝之後元也韓魏公喜營造所臨之郡必有改作皆宏壯雄深稱其度量在大名於正寢之後稍西為堂五楹尤大其間洞然不為房室號善飬堂葢其平日宴息之地也國朝既以節度使為武官之秩然文臣前二府之乆次者間亦得之葢優禮也其不歴二府而為節度使者自國初至今凡六人然皆有由陳康肅堯咨始自翰林學士換宿州觀察使知天雄軍特詔位丞郎上其後自安國軍留後拜武信軍節度使張宣徽堯佐自禮部侍郎三司使拜淮康軍節度羣牧制置使宣徽南院使景靈宫使言者交章論之遂罷宣徽景靈二使頃之復加宣徽使判河陽王君貺自熈寜間以侍從乆次為宣徽使㑹官制作廢宣徽使不置時為之者獨有君貺與張文定二人特詔領使如故其後君貺判大名府當再任遂拜武安軍節度使蔡太保攸政和末自宣和殿大學士上清寳籙宫使拜淮康軍節度使靖康中張永錫孝純自延康殿學士知太原府拜撿挍少保某軍節度使建炎初杜僕射充自端明殿學士東京留守拜宣武軍節度使大抵陳康肅以次遷張宣徽以戚里王君貺以官制改革蔡居安以恩倖張永鍚以守禦之勞而杜僕射以居守欲重其任也國朝来不歴真相而為相者凡七人錢文僖程文簡夏文莊蔡元度蔡居安攸梁才甫子美而鄧樞宻洵武真以少保領院而不兼節鉞前所未有也却掃編卷下
